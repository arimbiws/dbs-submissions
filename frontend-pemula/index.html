<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <title>Bookshelf App</title>

    <!-- Impor script kamu di sini -->
    <!-- Lampirkan `defer` jika pemanggilan dilakukan dalam <head> -->
    <link rel="stylesheet" href="style.css" />
    <script defer src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <header>
      <h1>Bookshelf App</h1>
      <p>Kelola koleksi bukumu dengan mudah dan elegan</p>
    </header>

    <main>
      <div class="top-section">
        <div class="shelf-card">
          <section>
            <h2>Tambah Buku Baru</h2>
            <form id="bookForm" data-testid="bookForm">
              <div class="input-group">
                <label for="bookFormTitle">Judul Buku</label>
                <input id="bookFormTitle" type="text" required minlength="2" data-testid="bookFormTitleInput" placeholder="Contoh: Once Upon A Broken Heart" />
              </div>
              <div class="input-group">
                <label for="bookFormAuthor">Penulis</label>
                <input id="bookFormAuthor" type="text" required minlength="2" data-testid="bookFormAuthorInput" placeholder="Contoh: Stephanie Garber" />
              </div>
              <div class="input-group">
                <label for="bookFormYear">Tahun Rilis</label>
                <input id="bookFormYear" type="number" required min="1000" data-testid="bookFormYearInput" placeholder="Contoh: 2021" />
              </div>
              <div class="checkbox-group">
                <input id="bookFormIsComplete" type="checkbox" data-testid="bookFormIsCompleteCheckbox" />
                <label for="bookFormIsComplete">Buku sudah selesai dibaca</label>
              </div>
              <button id="bookFormSubmit" class="btn-primary" type="submit" data-testid="bookFormSubmitButton"><i class="fa-solid fa-plus"></i> Masukkan buku ke rak</button>
            </form>
          </section>
        </div>

        <div class="shelf-card search-card">
          <section>
            <h2>Cari Buku</h2>
            <form id="searchBook" data-testid="searchBookForm" class="search-form">
              <input id="searchBookTitle" type="text" data-testid="searchBookFormTitleInput" placeholder="Ketik judul buku di sini..." />
              <button id="searchSubmit" class="btn-primary" type="submit" data-testid="searchBookFormSubmitButton"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
          </section>
        </div>
      </div>

      <div class="shelf-container">
        <section class="incompleteSection shelf-card">
          <h3><i class="fa-solid fa-book-open text-warning"></i> Belum selesai dibaca</h3>
          <div id="incompleteBookList" data-testid="incompleteBookList" class="book-list"></div>
        </section>

        <section class="completeSection shelf-card">
          <h3><i class="fa-solid fa-book text-success"></i> Selesai dibaca</h3>
          <div id="completeBookList" data-testid="completeBookList" class="book-list"></div>
        </section>
      </div>
    </main>

    <div id="editModal" class="modal-overlay" style="display: none">
      <div class="modal-card">
        <h2>Edit Data Buku</h2>
        <form id="editBookForm">
          <input type="hidden" id="editBookId" />
          <div class="input-group">
            <label for="editBookTitle">Judul</label>
            <input id="editBookTitle" type="text" required minlength="2" />
          </div>
          <div class="input-group">
            <label for="editBookAuthor">Penulis</label>
            <input id="editBookAuthor" type="text" required minlength="2" />
          </div>
          <div class="input-group">
            <label for="editBookYear">Tahun</label>
            <input id="editBookYear" type="number" required min="1000" />
          </div>
          <div class="checkbox-group">
            <input id="editBookIsComplete" type="checkbox" />
            <label for="editBookIsComplete">Selesai dibaca</label>
          </div>
          <div class="modal-actions">
            <button type="submit" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> Simpan</button>
            <button type="button" id="cancelEditBtn" class="btn-danger"><i class="fa-solid fa-xmark"></i> Batal</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
